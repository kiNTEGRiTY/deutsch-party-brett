<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <meta name="darkreader-lock">
  <meta name="description" content="Deutsch Party Brett — Das lustige Lernspiel für die Grundschule!">
  <meta name="theme-color" content="#beddba">
  <title>Deutsch Party Brett</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%23ff4f7c'/%3E%3Cpath d='M18 16h28v9H18z' fill='%23ffd45a'/%3E%3Ccircle cx='22' cy='47' r='7' fill='%23fff8ef'/%3E%3Ccircle cx='42' cy='47' r='7' fill='%23fff8ef'/%3E%3Cpath d='M20 25h24l-4 16H24z' fill='%23fff8ef'/%3E%3C/svg%3E">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <link rel="stylesheet" href="css/design-tokens.css">
  <link rel="stylesheet" href="css/cardboard-games.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/screens/start.css">
  <link rel="stylesheet" href="css/screens/setup.css">
  <link rel="stylesheet" href="css/screens/board.css">
  <link rel="stylesheet" href="css/screens/minigame.css">
  <link rel="stylesheet" href="css/screens/results.css">

  <!-- Core layout lock -->
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: linear-gradient(180deg, #eef8e8 0%, #d9efcc 100%) !important;
      color-scheme: only light !important;
      forced-color-adjust: none !important;
      font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
    }

    .screen {
      position: absolute;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      display: none;
      flex-direction: column;
      background: linear-gradient(180deg, #eef8e8 0%, #d9efcc 100%) !important;
      overflow: hidden;
    }

    .screen.active {
      display: flex !important;
    }

    .board-screen, .board-screen.active {
      flex-direction: row !important;
    }

    #board-content {
      display: flex !important;
      flex-direction: row !important;
      position: absolute !important;
      top: 0 !important; left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      overflow: hidden !important;
    }

    @media (max-width: 980px), (orientation: portrait) and (max-width: 1400px) {
      .board-screen,
      .board-screen.active {
        flex-direction: column !important;
      }

      #board-content {
        flex-direction: column !important;
      }
    }
  </style>

  <!-- App -->
  <script type="module" src="js/app.js"></script>
</head>
<body>

  <!-- START SCREEN -->
  <div id="screen-start" class="screen start-screen">
    <div class="start-shell animate-screen">
      <section class="start-copy">
        <h1 class="start-title">Deutsch Party Brett</h1>
        <div class="start-actions">
          <button id="btn-new-game" type="button" class="btn btn-primary btn-lg">Neues Spiel</button>
          <button id="btn-continue" type="button" class="btn btn-secondary btn-lg">Fortsetzen</button>
          <button id="btn-minigames" type="button" class="btn btn-secondary btn-lg">Minispiele</button>
        </div>
      </section>
    </div>
  </div>

  <!-- SETUP SCREEN -->
  <div id="screen-setup" class="screen setup-screen">
    <div id="setup-content" style="width:100%;height:100%;overflow:auto;"></div>
  </div>

  <!-- BOARD SCREEN: board-content is the render target for BoardRenderer -->
  <div id="screen-board" class="screen board-screen" style="
    background: linear-gradient(180deg, #d7efca 0%, #c7e4bc 100%);
  ">
    <div id="board-content"></div>
  </div>

  <!-- MINIGAME MENU SCREEN -->
  <div id="screen-minigame-menu" class="screen setup-screen">
    <div id="minigame-menu-content" style="width:100%;height:100%;overflow:auto;"></div>
  </div>

  <!-- MINIGAME SCREEN -->
  <div id="screen-minigame" class="screen minigame-screen">
    <div id="minigame-content" style="width:100%;height:100%;"></div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="screen-results" class="screen results-screen">
    <div id="results-content" style="width:100%;height:100%;overflow:auto;"></div>
  </div>

  <!-- NO MASCOT LOADER: caused 44-image grid blocking buttons -->
</body>
</html>
